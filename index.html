<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phylogenetic Tree Generator</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { display: flex; gap: 20px; }
        textarea { width: 300px; height: 400px; font-family: monospace; }
        canvas { background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Cladogram Generator</h2>
    <div class="controls">
        <button onclick="renderTree()">Generate Tree</button>
        <small>Edit the JSON below to update the tree structure.</small>
    </div>

    <div class="container">
        <textarea id="treeData">
{
  "name": "Life",
  "children": [
    {
      "name": "Bacteria"
    },
    {
      "name": "Archaea"
    },
    {
      "name": "Eukaryota",
      "children": [
        { "name": "Protista" },
        { "name": "Fungi" },
        { "name": "Plantae" },
        { "name": "Animalia" }
      ]
    }
  ]
}
        </textarea>
        <canvas id="treeCanvas" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function renderTree() {
            const rawData = document.getElementById('treeData').value;
            let data;
            try {
                data = JSON.parse(rawData);
            } catch (e) {
                alert("Invalid JSON format!");
                return;
            }

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const margin = 50;
            const width = canvas.width - margin * 2;
            const height = canvas.height - margin * 2;

            drawNode(data, margin, margin, width, height);
        }

        function drawNode(node, x, y, w, h) {
            const isLeaf = !node.children || node.children.length === 0;

            // Draw horizontal branch line
            ctx.beginPath();
            ctx.moveTo(x, y + h / 2);
            ctx.lineTo(x + 50, y + h / 2);
            ctx.stroke();

            if (isLeaf) {
                // Draw name at the end of the branch
                ctx.fillText(node.name, x + 55, y + h / 2 + 4);
            } else {
                const childCount = node.children.length;
                const segmentH = h / childCount;

                // Draw vertical connector line
                const firstChildY = y + (segmentH / 2);
                const lastChildY = y + h - (segmentH / 2);
                
                ctx.beginPath();
                ctx.moveTo(x + 50, firstChildY);
                ctx.lineTo(x + 50, lastChildY);
                ctx.stroke();

                // Recursively draw children
                node.children.forEach((child, i) => {
                    drawNode(child, x + 50, y + (i * segmentH), w - 50, segmentH);
                });
            }
        }

        // Initial render
        renderTree();
    </script>
</body>
</html>
